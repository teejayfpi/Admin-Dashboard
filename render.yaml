services:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend: Express API Server on Render
  # Service: https://coopvest-api-v3.onrender.com
  # ──────────────────────────────────────────────────────────────────────────────
  - type: web
    name: coopvest-api-v3
    env: node
    plan: free
    runtime: node_24
    region: oregon
    buildCommand: bash render-build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    rootDir: artifacts/api-server
    id: srv-d8epoj42m8qs7396p1tg
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        value: "https://placeholder.supabase.co"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "placeholder-key-replace-in-dashboard"
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: DASHBOARD_URL
        value: "https://coopvest-admin-dashboard.vercel.app"

