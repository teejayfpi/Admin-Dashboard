services:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend: Express API Server on Render
  # Service: https://coopvest-api.onrender.com
  # ──────────────────────────────────────────────────────────────────────────────
  - type: web
    name: coopvest-api
    env: node
    plan: free
    buildCommand: ./render-build.sh
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false

