name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: coopvestafrica-ops
  VERCEL_PROJECT_ID: coopvest-africas-projects

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "artifacts/coopvest-dashboard/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: artifacts/coopvest-dashboard

      - name: Install Vercel
        run: npm install vercel@latest
        working-directory: artifacts/coopvest-dashboard

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/coopvest-dashboard

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/coopvest-dashboard

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/coopvest-dashboard