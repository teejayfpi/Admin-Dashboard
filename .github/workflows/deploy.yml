name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: ""
  VERCEL_PROJECT_ID: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "artifacts/coopvest-dashboard/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: artifacts/coopvest-dashboard

      - name: Pull Vercel Environment
        run: |
          unset VERCEL_ORG_ID
          unset VERCEL_PROJECT_ID
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/coopvest-dashboard

      - name: Build Project
        run: |
          unset VERCEL_ORG_ID
          unset VERCEL_PROJECT_ID
          rm -rf dist .vercel/output
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/coopvest-dashboard

      - name: Deploy to Vercel
        run: |
          unset VERCEL_ORG_ID
          unset VERCEL_PROJECT_ID
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/coopvest-dashboard